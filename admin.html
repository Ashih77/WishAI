<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishAI - لوحة التحكم السحابية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: var(--text);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { text-align: center; color: var(--primary); }
        .login-box {
            background: var(--surface); padding: 2rem; border-radius: 12px;
            max-width: 400px; margin: 4rem auto; text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid #334155; background: #0f172a; color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: var(--primary); color: #fff; font-weight: bold;
            cursor: pointer; font-family: inherit;
        }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem; margin-top: 2rem;
        }
        .card {
            background: var(--surface); border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .card img { width: 100%; height: auto; display: block; }
        .card-info { padding: 1rem; font-size: 0.9rem; line-height: 1.5; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            background: #334155; font-size: 0.8rem; margin: 2px;
        }
        .loading { text-align: center; margin-top: 2rem; display: none; }
        .hidden { display: none !important; }

        /* AI Analysis Modal & Buttons */
        .btn-sm { padding: 8px 12px; font-size: 0.85rem; border-radius: 6px; border: none; cursor: pointer; color: #fff; width: auto; font-family: inherit; font-weight: bold; flex: 1; }
        .btn-json { background: #3b82f6; }
        .btn-json:hover { background: #2563eb; }
        .btn-ai { background: #10b981; }
        .btn-ai:hover { background: #059669; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; }
        .modal-content { background: var(--surface); padding: 2rem; border-radius: 12px; max-width: 600px; width: 90%; position: relative; max-height: 85vh; overflow-y: auto;}
        .close-modal { position: absolute; top: 1rem; left: 1rem; background: none; border: none; color: #cbd5e1; font-size: 1.5rem; cursor: pointer; width: auto; padding: 0; }
        .close-modal:hover { color: #fff; }
        .ai-results h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #334155; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WishAI Cloud Admin ☁️</h1>
        
        <div id="login-view" class="login-box">
            <p>الرجاء إدخال كلمة مرور الإدارة لعرض الصور المولدة من قبل المستخدمين</p>
            <input type="password" id="admin-pass" placeholder="كلمة المرور...">
            <button id="login-btn">دخول</button>
            <p id="error-msg" style="color: #ef4444; margin-top: 10px;" class="hidden">كلمة المرور غير صحيحة.</p>
        </div>

        <div id="dashboard-view" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; background:var(--surface); padding:1.2rem; border-radius:12px; margin-bottom:1.5rem; border: 1px solid #334155;">
                <div>
                    <h2 style="margin:0 0 8px 0; color:var(--primary); font-size:1.3rem;">تقرير الأداء والتقييمات 📊</h2>
                    <p style="margin:0; font-size:0.95rem; color:#cbd5e1;">
                        إجمالي البطاقات المتعقبة: <strong id="total-count" style="color:#fff;">0</strong> |
                        المراجعات المستلمة: <strong id="total-ratings" style="color:#fff;">0</strong> |
                        متوسط التقييم: <strong id="avg-rating" style="color:#fbbf24;">0.0</strong> ⭐
                    </p>
                </div>
                <button onclick="location.reload()" style="width: auto; padding: 10px 20px;">تحديث التقرير 🔄</button>
            </div>
            
            <div id="loading" class="loading">جاري جلب البيانات السحابية... ⏳</div>
            <div id="cloud-grid" class="grid"></div>
        </div>

        <!-- AI Modal -->
        <div id="ai-modal" class="modal">
            <div class="modal-content">
                <button class="close-modal" aria-label="أغلق" onclick="document.getElementById('ai-modal').style.display='none'">✖</button>
                <div id="ai-results"></div>
            </div>
        </div>
    </div>

    <script>
        const loginBtn = document.getElementById('login-btn');
        const passInput = document.getElementById('admin-pass');
        const errorMsg = document.getElementById('error-msg');
        
        loginBtn.onclick = async () => {
            const pass = passInput.value.trim();
            if (!pass) return;

            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('loading').style.display = 'block';

            try {
                const res = await fetch(`/api/list-cloud?pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';

                if (!data.ok) {
                    throw new Error(data.error);
                }

                renderDashboard(data.generations, pass);
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('dashboard-view').classList.add('hidden');
                errorMsg.classList.remove('hidden');
                console.error(err);
            }
        };

        function getStars(rating) {
            if (!rating) return '<span style="color:#64748b; font-size:0.8rem;">بدون تقييم</span>';
            return '<span style="color:#fbbf24; letter-spacing: 2px;">' + '★'.repeat(rating) + '☆'.repeat(5 - rating) + '</span>';
        }

        function renderDashboard(items, pass) {
            document.getElementById('total-count').textContent = items.length;
            
            let totalRatingSum = 0;
            let ratingsCount = 0;

            const grid = document.getElementById('cloud-grid');
            const htmlContent = items.map(item => {
                const meta = item.metadata || {};
                const date = new Date(meta.timestamp || Date.now()).toLocaleString('ar-EG');
                
                if (meta.rating) {
                    totalRatingSum += parseInt(meta.rating);
                    ratingsCount++;
                }

                return `
                    <div class="card">
                        <img src="/api/get-cloud-image?key=${item.key}&pass=${pass}" alt="Generated Image" loading="lazy">
                        
                        <div class="card-info" style="border-bottom: 1px solid #334155; padding-bottom: 12px; margin-bottom: 6px;">
                            <div style="font-size: 1.1rem; margin-bottom: 5px;">${getStars(meta.rating)}</div>
                            ${meta.feedback ? `<div style="margin-top:8px; padding:10px; background:#0f172a; border-radius:8px; font-size:0.9rem; line-height:1.4; border-left: 3px solid var(--primary);">"${meta.feedback}"</div>` : ''}
                        </div>

                        <div class="card-info" style="padding-top:0;">
                            <strong>التاريخ:</strong> ${date}<br>
                            <strong>المستخدم:</strong> ${meta.name || 'مجهول'}<br>
                            <strong>المناسبة:</strong> <span class="badge">${meta.occasion || 'غير محدد'}</span><br>
                            <strong>النمط:</strong> <span class="badge">${meta.style || 'modern'}</span>
                            ${meta.subStyle ? `<span class="badge">${meta.subStyle}</span>` : ''}<br>
                            <strong>التفاصيل:</strong> ${meta.details || '-'} | <strong>الألوان:</strong> ${meta.colorIntensity || '-'}<br>
                            <strong>التهنئة:</strong> ${meta.greeting || '-'}<br>
                            ${meta.instructions ? `<strong>تعليمات إضافية:</strong> <span style="color:#fbbf24">${meta.instructions}</span>` : ''}
                        </div>
                        <div style="padding: 12px; border-top: 1px solid #334155; background: #0f172a; display: flex; gap: 8px;">
                            <button class="btn-sm btn-json" onclick='copyJson(${JSON.stringify(meta).replace(/'/g, "&#39;")})'>📋 نسخ JSON</button>
                            <button class="btn-sm btn-ai" onclick='evaluateAI("${item.key}", "${pass}", ${JSON.stringify(meta).replace(/'/g, "&#39;")})'>🤖 تقييم AI</button>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = htmlContent.join('');
            
            // Update Dashboard Stats
            document.getElementById('total-ratings').textContent = ratingsCount;
            const avg = ratingsCount > 0 ? (totalRatingSum / ratingsCount).toFixed(1) : '0.0';
            document.getElementById('avg-rating').textContent = avg;
        }

        // Allow 'Enter' key login
        passInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loginBtn.click();
        });

        // Copy JSON logic
        function copyJson(meta) {
            navigator.clipboard.writeText(JSON.stringify(meta, null, 2)).then(() => {
                alert("تم نسخ وصف JSON بنجاح!");
            });
        }

        // AI Evaluation Logic
        async function evaluateAI(key, pass, meta) {
            const modal = document.getElementById('ai-modal');
            const resultsDiv = document.getElementById('ai-results');
            modal.style.display = 'flex';
            resultsDiv.innerHTML = '<div style="text-align:center; padding: 20px;">جاري دراسة الصورة وتقييم المعطيات بالذكاء الاصطناعي... ⏳<br><br><span style="font-size:0.85rem;color:#94a3b8;">قد يستغرق هذا بضع ثوانٍ</span></div>';

            try {
                // Fetch image base64
                const imgRes = await fetch(`/api/get-cloud-image?key=${key}&pass=${pass}`);
                const blob = await imgRes.blob();
                const base64data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });

                const prompt = `أنت خبير ذكاء اصطناعي يقوم بتقييم بطاقة تهنئة تم توليدها.
المعطيات (JSON) التي طلبها المستخدم:
\`\`\`json
${JSON.stringify(meta, null, 2)}
\`\`\`
يرجى مطابقة الصورة المرفقة مع المعطيات، وإعطاء التقييم بناءً على: مدى الالتزام بـ (المناسبة، الأسلوب، التشكيل، موقع الاسم، التعليمات) والجودة الفنية للصورة.
اكتب التقرير باللغة العربية حصراً بالضبط بالصيغة التالية (بدون زيادات):
التقييم: [رقم من 10]
الملخص: [جملتين تلخص نقاط القوة والضعف بشكل احترافي]
الاقتراحات:
- [نصيحة عملية 1 لتحسين معطيات JSON للحصول على نتيجة أفضل مستقبلا]
- [نصيحة عملية 2]`;

                const payload = {
                    action: 'evaluate',
                    contents: [
                        {
                            role: 'user',
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: 'image/jpeg', data: base64data } }
                            ]
                        }
                    ]
                };

                const res = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (!data.ok) throw new Error(data.error || data.message || 'Failed to analyze');
                
                let aiText = data.data.candidates[0].content.parts[0].text;
                // Format markdown list dashes and bolder text
                aiText = aiText.replace(/\n- /g, '<br>• ')
                               .replace(/التقييم:/g, '<strong>التقييم:</strong>')
                               .replace(/الملخص:/g, '<br><strong>الملخص:</strong>')
                               .replace(/الاقتراحات:/g, '<br><br><strong>الاقتراحات:</strong>');

                resultsDiv.innerHTML = `
                    <h3>🤖 تقرير التقييم الذكي</h3>
                    <div style="line-height:1.7; font-size:1rem;">${aiText}</div>
                `;
            } catch (err) {
                console.error(err);
                resultsDiv.innerHTML = `<div style="color:#ef4444;text-align:center; padding: 20px;">حدث خطأ أثناء التقييم: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
